<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Classique Willowbell | Enquiry</title>

<link rel="icon" type="image/png" href="favicon-96x96.png" sizes="96x96" />
<link rel="icon" type="image/svg+xml" href="favicon.svg" />
<link rel="shortcut icon" href="favicon.ico" />
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />
<link rel="manifest" href="site.webmanifest" />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root { 
    --primary: #1E4B27; 
    --primary-hover: #14361A; 
    --bg: #F4F7F5; 
    --surface: #FFFFFF; 
    --text: #2d3748; 
    --border: #CBD5E0;
    --error: #E53E3E;
  }
  
  body { 
    font-family: 'Montserrat', sans-serif; 
    background-color: var(--bg); 
    color: var(--text); 
    display: flex; 
    justify-content: center; 
    padding: 2rem; 
    margin: 0; 
  }
  
  .form-container { 
    background: var(--surface); 
    padding: 3rem; 
    border-radius: 12px; 
    box-shadow: 0 10px 30px rgba(0,0,0,0.06); 
    width: 100%; 
    max-width: 600px; 
  }

  .logo-container {
    text-align: center;
    margin-bottom: 2rem;
  }

  .logo-container img {
    max-width: 220px;
    height: auto;
  }
  
  h2 { margin-top: 0; text-align: center; letter-spacing: 0.5px; margin-bottom: 0.5rem;}
  .project-highlight { color: var(--primary); font-weight: 800; }
  .enquiry-text { color: #A0AEC0; font-weight: 500; }
  
  p.subtitle { color: #718096; font-size: 0.95rem; margin-bottom: 2.5rem; text-align: center; font-weight: 500; line-height: 1.5; margin-top: 0;}
  
  .form-group { margin-bottom: 1.5rem; }
  
  label { display: block; font-size: 0.9rem; font-weight: 600; margin-bottom: 0.5rem; color: #4A5568; }
  .required { color: var(--error); }
  
  input[type="text"], input[type="email"], input[type="tel"], select { 
    width: 100%; 
    padding: 0.85rem; 
    border: 1px solid var(--border); 
    border-radius: 6px; 
    font-size: 1rem; 
    box-sizing: border-box; 
    transition: all 0.2s; 
    font-family: inherit;
    background-color: #F7FAFC;
  }
  
  input:focus, select:focus { 
    outline: none; 
    border-color: var(--primary); 
    box-shadow: 0 0 0 3px rgba(30, 75, 39, 0.15); 
    background-color: #FFFFFF;
  }

  .radio-btn-group {
    display: flex;
    gap: 10px;
  }
  .radio-btn-group input[type="radio"] {
    display: none;
  }
  .radio-btn-group label {
    flex: 1;
    text-align: center;
    background: #F7FAFC;
    border: 1px solid var(--border);
    padding: 10px;
    border-radius: 6px;
    cursor: pointer;
    font-weight: 600;
    color: #4A5568;
    transition: all 0.2s;
  }
  .radio-btn-group input[type="radio"]:checked + label {
    background: var(--primary);
    color: white;
    border-color: var(--primary);
  }

  .hidden-field {
    display: none;
    margin-top: 1rem;
    animation: fadeIn 0.3s ease-in-out;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(-5px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .disclaimer-box {
    background: #F0F4F8;
    padding: 1rem;
    border-radius: 6px;
    font-size: 0.8rem;
    line-height: 1.5;
    color: #4A5568;
    display: flex;
    align-items: flex-start;
    gap: 10px;
    margin-top: 2rem;
  }
  .disclaimer-box input[type="checkbox"] {
    margin-top: 3px;
    width: 1.2rem;
    height: 1.2rem;
    cursor: pointer;
    accent-color: var(--primary);
  }
  
  .submit-btn { 
    background: var(--primary); 
    color: white; 
    border: none; 
    padding: 1.25rem; 
    border-radius: 8px; 
    width: 100%; 
    font-size: 1.15rem; 
    font-weight: 700; 
    cursor: pointer; 
    transition: background 0.2s; 
    font-family: inherit;
    margin-top: 1.5rem;
  }
  .submit-btn:hover { background: var(--primary-hover); }
  
  #status-message { 
    margin-top: 1.5rem; 
    text-align: center; 
    font-weight: 600; 
    font-size: 1rem;
    min-height: 20px;
  }

  #success-screen {
    display: none;
    text-align: center;
    padding: 2rem 0;
  }
  .check-icon {
    width: 70px; height: 70px; background-color: #DEF7EC; color: #059669; border-radius: 50%;
    display: flex; align-items: center; justify-content: center; font-size: 35px; margin: 0 auto 1.5rem auto;
  }
</style>
</head>
<body>

<div class="form-container">
  <div class="logo-container">
    <img src="logo-amv.jpg" alt="Allegro Mahabaleshwara Ventures Logo">
  </div>
  
  <div id="form-screen">
    <h2><span class="project-highlight">Classique Willowbell</span> <span class="enquiry-text">| Enquiry</span></h2>
    <p class="subtitle">Please provide your details below</p>
    
    <form id="enquiryForm">
      
      <div class="form-group">
        <label>Full Name <span class="required">*</span></label>
        <input type="text" name="name" placeholder="Enter your full name" required>
      </div>

      <div class="form-group">
        <label>WhatsApp Number <span class="required">*</span></label>
        <input type="tel" name="whatsapp" placeholder="10-digit mobile number" pattern="[0-9]{10}" title="Please enter exactly 10 digits" required>
      </div>

      <div class="form-group">
        <label>Email Address <span class="required">*</span></label>
        <input type="email" name="email" placeholder="email@example.com" required>
      </div>

      <div class="form-group">
        <label>Requirement <span class="required">*</span></label>
        <div class="radio-btn-group">
          <input type="radio" id="req2" name="requirement" value="2 BHK" required>
          <label for="req2">2 BHK</label>
          
          <input type="radio" id="req3" name="requirement" value="3 BHK">
          <label for="req3">3 BHK</label>
          
          <input type="radio" id="req4" name="requirement" value="4 BHK">
          <label for="req4">4 BHK</label>
        </div>
      </div>

      <div class="form-group">
        <label>Planning to Purchase?</label>
        <div class="radio-btn-group" style="font-size: 0.85rem;">
          <input type="radio" id="time1" name="timeline" value="Immediate">
          <label for="time1">Immediate</label>
          
          <input type="radio" id="time2" name="timeline" value="1-3 Months">
          <label for="time2">1-3 Months</label>
          
          <input type="radio" id="time3" name="timeline" value="Just Exploring">
          <label for="time3">Exploring</label>
        </div>
      </div>

      <div class="form-group">
        <label>How did you hear about us? <span class="required">*</span></label>
        <select id="sourceSelect" name="source" required onchange="handleSourceChange()">
          <option value="" disabled selected>Select an option</option>
          <option value="Online Ads">Online Ads (Google/Facebook)</option>
          <option value="Social Media">Social Media (Instagram/LinkedIn)</option>
          <option value="Print Ads">Print Ads / Newspaper</option>
          <option value="Billboards">Billboards / Hoardings</option>
          <option value="Referral">Referral (Friend/Family)</option>
          <option value="Other">Other</option>
        </select>

        <div id="dynamicSourceBox" class="hidden-field">
          <input type="text" id="sourceDetails" name="sourceDetails" placeholder="Please specify...">
        </div>
      </div>

      <div class="disclaimer-box">
        <input type="checkbox" id="consent" name="consent" checked required>
        <label for="consent" style="font-weight: 400; margin:0; cursor: pointer;">
          I authorize Allegro Mahabaleshwara Ventures LLP and its representatives to contact me via phone, SMS, WhatsApp, and email regarding my enquiry. This consent overrides any NDNC/DND registration.
        </label>
      </div>

      <button type="submit" class="submit-btn" id="submitBtn">Submit Enquiry</button>
      <div id="status-message"></div>
    </form>
  </div>

  <div id="success-screen">
    <div class="check-icon">✓</div>
    <h2>Thank You!</h2>
    <p style="color: #4A5568; margin-bottom: 2rem;">Your details have been successfully registered. A representative will be with you shortly.</p>
    <p style="font-size: 0.85rem; color: #A0AEC0;">Refreshing for next guest...</p>
  </div>

</div>

<script>
  // Handles the "Other/Referral" dropdown logic
  function handleSourceChange() {
    const select = document.getElementById("sourceSelect");
    const dynamicBox = document.getElementById("dynamicSourceBox");
    const dynamicInput = document.getElementById("sourceDetails");
    
    if (select.value === "Referral") {
      dynamicBox.style.display = "block";
      dynamicInput.placeholder = "Enter Referral Name / Details";
      dynamicInput.required = true;
    } else if (select.value === "Other") {
      dynamicBox.style.display = "block";
      dynamicInput.placeholder = "Please specify...";
      dynamicInput.required = true;
    } else {
      dynamicBox.style.display = "none";
      dynamicInput.value = "";
      dynamicInput.required = false;
    }
  }

  const form = document.getElementById('enquiryForm');
  const submitBtn = document.getElementById('submitBtn');
  const statusMsg = document.getElementById('status-message');
  const formScreen = document.getElementById('form-screen');
  const successScreen = document.getElementById('success-screen');

  form.addEventListener('submit', async (e) => {
    e.preventDefault(); 
    submitBtn.textContent = 'Submitting...';
    submitBtn.disabled = true;

    try {
      const formData = new FormData(form);
      const payload = Object.fromEntries(formData.entries());
      
      // Kept as a boolean to ensure the old script doesn't break
      payload.consent = formData.has('consent');

      // ==========================================
      // ROUTE 1: Send to the OLD Sales Team Sheet
      // ==========================================
      const oldUrl = 'https://script.google.com/macros/s/AKfycbzQbG53H84JS22mXkZbihKddGwTn0RSZzjVQ_e-5oLGYu5M54i9ZpM-2qtWnIMYs7bDaQ/exec';
      fetch(oldUrl, {
        method: 'POST',
        mode: 'no-cors',
        body: JSON.stringify(payload)
      });

      // ==========================================
      // ROUTE 2: Send to the NEW Master AppSheet CRM
      // ==========================================
      const newUrl = 'https://script.google.com/macros/s/AKfycbwf-i_yDOzMMH0MqL9NkMLX7zp4vEzgRI44Fp9CCaT9UbJ1VZ02OZSVDpepU6QkZ4EReA/exec';
      fetch(newUrl, {
        method: 'POST',
        mode: 'no-cors',
        body: JSON.stringify(payload)
      });

      // Trigger the UI animation immediately
      formScreen.style.display = "none";
      successScreen.style.display = "block";
      
      setTimeout(() => {
        form.reset();
        document.getElementById('consent').checked = true;
        document.getElementById("dynamicSourceBox").style.display = "none";
        formScreen.style.display = "block";
        successScreen.style.display = "none";
        submitBtn.textContent = 'Submit Enquiry';
        submitBtn.disabled = false;
      }, 4000);

    } catch (error) {
      console.error(error);
      statusMsg.style.color = '#E53E3E'; 
      statusMsg.textContent = 'Error saving details. Please try again.';
      submitBtn.textContent = 'Submit Enquiry';
      submitBtn.disabled = false;
    }
  });
</script>
</body>
</html>
