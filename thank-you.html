<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Application Submitted - Classique Willowbell</title>

<link rel="icon" type="image/png" href="favicon-96x96.png" sizes="96x96" />
<link rel="icon" type="image/svg+xml" href="favicon.svg" />
<link rel="shortcut icon" href="favicon.ico" />
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />
<link rel="manifest" href="site.webmanifest" />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root { 
    --primary: #1E4B27; 
    --bg: #F4F7F5; 
    --surface: #FFFFFF; 
    --text: #2d3748; 
  }
  
  body { 
    font-family: 'Montserrat', sans-serif; 
    background-color: var(--bg); 
    color: var(--text); 
    display: flex; 
    justify-content: center; 
    align-items: center;
    min-height: 100vh;
    padding: 2rem; 
    margin: 0; 
  }
  
  .success-container { 
    background: var(--surface); 
    padding: 4rem 3rem; 
    border-radius: 12px; 
    box-shadow: 0 10px 30px rgba(0,0,0,0.06); 
    width: 100%; 
    max-width: 600px; 
    text-align: center;
    animation: fadeIn 0.5s ease-in-out;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .logo-container {
    margin-bottom: 2rem;
  }

  .logo-container img {
    max-width: 200px;
    height: auto;
  }

  .check-icon {
    width: 80px;
    height: 80px;
    background-color: #DEF7EC;
    color: #059669;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 40px;
    margin: 0 auto 1.5rem auto;
  }
  
  h2 { margin-top: 0; color: var(--primary); font-weight: 700; letter-spacing: 0.5px; font-size: 1.8rem; margin-bottom: 1rem;}
  p.message { color: #4A5568; font-size: 1.1rem; margin-bottom: 2.5rem; line-height: 1.6; font-weight: 500;}
  
  .return-btn { 
    background: var(--primary); 
    color: white; 
    border: none; 
    padding: 1rem 2rem; 
    border-radius: 8px; 
    font-size: 1rem; 
    font-weight: 600; 
    cursor: pointer; 
    text-decoration: none;
    display: inline-block;
    transition: background 0.2s; 
  }
  .return-btn:hover { background: #14361A; }

</style>
</head>
<body>

<div class="success-container">
  <div class="logo-container">
    <img src="logo-amv.jpg" alt="Allegro Mahabaleshwara Ventures Logo">
  </div>
  
  <div class="check-icon">✓</div>
  
  <h2>Application Submitted!</h2>
  <p class="message">Thank you. Your booking application and documents for Classique Willowbell have been securely received. Our team will review your details and contact you shortly.</p>
  
  <a href="https://amvbuild.in/" class="return-btn">Return to Main Website</a>
</div>

</body>
</html>
